<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desain Tampilan IQES</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Judul Halaman -->
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center uppercase tracking-wider">
            Desain Tampilan IQES
        </h1>

        <!-- Container Tabel -->
        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <table class="min-w-full leading-normal">
                <thead>
                    <tr class="bg-indigo-600 text-white text-left text-sm uppercase font-semibold">
                        <th class="px-5 py-3 border-b-2 border-gray-200 w-16 text-center">No</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200">Nama Menu</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody class="text-gray-700">
                    <!-- Baris 1 -->
                    <tr class="hover:bg-gray-100 transition-colors">
                        <td class="px-5 py-4 border-b border-gray-200 text-center">1</td>
                        <td class="px-5 py-4 border-b border-gray-200 font-medium">Penugasan Auditor</td>
                        <td class="px-5 py-4 border-b border-gray-200 text-center">
                            <button class="bg-blue-500 hover:bg-blue-700 text-white py-1 px-4 rounded text-sm transition"><a href="penugasan-auditor.html">Lihat</a></button>
                        </td>
                    </tr>
                    <!-- Baris 2 -->
                    <tr class="hover:bg-gray-100 transition-colors">
                        <td class="px-5 py-4 border-b border-gray-200 text-center">2</td>
                        <td class="px-5 py-4 border-b border-gray-200 font-medium">Manajemen Pengguna</td>
                        <td class="px-5 py-4 border-b border-gray-200 text-center">
                            <button class="bg-blue-500 hover:bg-blue-700 text-white py-1 px-4 rounded text-sm transition">Lihat</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
